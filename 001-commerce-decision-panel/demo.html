<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commerce Decision Panel Demo</title>

  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      margin: 0;
      padding: 60px;
      background: #f6f6f6;
      color: #111;
    }

    .demo-layout {
      display: flex;
      gap: 48px;
      align-items: flex-start;
      max-width: 1100px;
      margin: 0 auto;
    }

    .options {
      display: grid;
      grid-template-columns: repeat(3, 150px);
      gap: 16px;
    }

    .option-card {
      background: #fff;
      border: 2px solid #ddd;
      border-radius: 10px;
      padding: 24px 12px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .option-card:hover {
      border-color: #111;
      transform: translateY(-2px);
    }

    .decision-panel {
      width: 380px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    }

    .preview-image {
      height: 220px;
      background: #e9e9e9;
      border-radius: 10px;
      margin: 18px 0;
    }

    @media (max-width: 900px) {
      .demo-layout {
        flex-direction: column;
      }

      .options {
        grid-template-columns: repeat(2, 150px);
      }

      .decision-panel {
        width: auto;
      }
    }
  </style>
</head>

<body>
  <div class="demo-layout">
    <div>
      <h1>Commerce Decision Panel</h1>
      <p>Hover over a product option to preview details.</p>

      <div class="options">
        <div class="option-card">Cloud Sofa</div>
        <div class="option-card">Modern Sofa</div>
        <div class="option-card">Emerald Sofa</div>
        <div class="option-card">Round Coffee Table</div>
        <div class="option-card">Luxury Table</div>
        <div class="option-card">Marble Table</div>
      </div>
    </div>

    <div class="decision-panel">
      <h2>Select an item</h2>
      <div class="preview-image"></div>
      <p><strong>Size:</strong> --</p>
      <p><strong>Material:</strong> --</p>
      <p><strong>Reference Price:</strong> --</p>
      <p>Product details will appear here.</p>
    </div>
  </div>
</body>
</html>
