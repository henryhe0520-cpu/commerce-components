<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commerce Decision Panel Demo</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="demo-layout">
    <div>
      <h1>Commerce Decision Panel</h1>
      <p>Hover over a product option to preview details.</p>

      <div class="options" id="options"></div>
    </div>

  <div class="decision-panel">
  <h2 id="panel-title">Select an item</h2>

  <div class="preview-image" id="panel-image"></div>

  <p><strong>Size:</strong> <span id="panel-size">--</span></p>

  <p><strong>Material:</strong> <span id="panel-material">--</span></p>

  <p><strong>Reference Price:</strong> <span id="panel-price">--</span></p>

  <p id="panel-description">
    Product details will appear here.
  </p>
</div>
  </div>
  <script>

const products = [
  {
    name: "Cloud Sofa",
    size: "2800 × 1100 × 800 mm",
    material: "Solid wood + High-density foam",
    price: "$5,635",
    description: "Soft curved sofa designed for modern living rooms."
  },
  {
    name: "Modern Sofa",
    size: "3000 × 1020 × 700 mm",
    material: "Solid wood + Foam",
    price: "$6,400",
    description: "Minimal contemporary sofa."
  }
];

const optionsContainer = document.getElementById("options");

products.forEach(product => {

  const card = document.createElement("div");

  card.className = "option-card";

  card.textContent = product.name;

  optionsContainer.appendChild(card);

});

</script>
</body>
</html>
