<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commerce Decision Panel Demo</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="demo-layout">
    <div>
      <h1>Commerce Decision Panel</h1>
     <p>Click a product option to preview details.</p>

      <div class="options" id="options"></div>
    </div>

  <div class="decision-panel">
  <h2 id="panel-title">Select an item</h2>

  <div class="preview-image" id="panel-image"></div>

  <p><strong>Size:</strong> <span id="panel-size">--</span></p>

  <p><strong>Material:</strong> <span id="panel-material">--</span></p>

  <p><strong>Reference Price:</strong> <span id="panel-price">--</span></p>

  <p id="panel-description">
    Product details will appear here.
  </p>
</div>
  </div>
 <script src="script.js"></script>
</body>
</html>
